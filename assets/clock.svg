<svg width="130" height="130" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">
  <circle cx="65" cy="65" r="60" fill="#2c2c34"/>
  <circle cx="65" cy="65" r="60" fill="none" stroke="#c79a3a" stroke-width="6"/>
  <circle cx="65" cy="65" r="50" fill="#f0ead6"/>
  <!-- hour ticks -->
  <g stroke="#33333a" stroke-width="3">
    <line x1="65" y1="20" x2="65" y2="28"/>
    <line x1="110" y1="65" x2="102" y2="65"/>
    <line x1="65" y1="110" x2="65" y2="102"/>
    <line x1="20" y1="65" x2="28" y2="65"/>
  </g>
  <!-- numerals 7 and 4 emphasized -->
  <text x="42" y="100" font-family="Georgia, serif" font-size="16" fill="#2c2c34" text-anchor="middle" font-weight="bold">7</text>
  <text x="100" y="78" font-family="Georgia, serif" font-size="16" fill="#2c2c34" text-anchor="middle" font-weight="bold">4</text>
  <!-- hands: hour to 7, minute to 4 -->
  <line x1="65" y1="65" x2="44" y2="92" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <line x1="65" y1="65" x2="96" y2="86" stroke="#222" stroke-width="4" stroke-linecap="round"/>
  <circle cx="65" cy="65" r="6" fill="#8c3b3b"/>
</svg>
